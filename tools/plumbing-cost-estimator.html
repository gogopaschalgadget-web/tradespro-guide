<body>
    <div class="container">
        <header>
            <h1>💰 Plumbing Cost Estimator</h1>
            <p class="subtitle">Get instant pricing estimates for common plumbing jobs</p>
        </header>
        
        <form id="estimatorForm">
            <div class="form-group">
                <label for="jobType">Job Type</label>
                <select id="jobType" required>
                    <option value="">Select a job type...</option>
                    <option value="leak">Leak Repair</option>
                    <option value="pipe">Pipe Replacement</option>
                    <option value="drain">Drain Cleaning</option>
                    <option value="heater">Water Heater Installation</option>
                    <option value="faucet">Faucet Replacement</option>
                    <option value="toilet">Toilet Repair</option>
                    <option value="sewer">Sewer Line Repair</option>
                    <option value="disposal">Garbage Disposal Installation</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="propertyType">Property Type</label>
                <select id="propertyType" required>
                    <option value="">Select property type...</option>
                    <option value="residential">Residential</option>
                    <option value="commercial">Commercial</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="region">Region</label>
                <select id="region" required>
                    <option value="">Select region...</option>
                    <option value="northeast">Northeast</option>
                    <option value="southeast">Southeast</option>
                    <option value="midwest">Midwest</option>
                    <option value="southwest">Southwest</option>
                    <option value="west">West Coast</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="urgency">Urgency</label>
                <select id="urgency" required>
                    <option value="">Select urgency...</option>
                    <option value="standard">Standard (2-3 business days)</option>
                    <option value="sameday">Same-Day Service</option>
                    <option value="emergency">Emergency (24/7)</option>
                </select>
            </div>
            
            <button type="submit">Get Estimate</button>
        </form>
        
        <div id="result" class="result">
            <div class="estimate-header">Estimated Cost Range</div>
            <div class="cost-range" id="costRange"></div>
            <div class="job-details" id="jobDetails"></div>
            <div class="tools-section">
                <div class="tools-title">Recommended Tools for This Job</div>
                <div class="tool-links" id="toolLinks"></div>
            </div>
        </div>
        
        <div class="footer">
            <p>Need professional help? <a href="https://gogopaschalgadget-web.github.io/tradespro-guide/">Back to TradesPro Home</a></p>
            <p style="margin-top: 10px; font-size: 0.85em; color: #808080;">Estimates are based on 2026 market data. Actual costs may vary by location and contractor.</p>
        </div>

    <script>
        const costData = {
            leak: {
                base: { low: 150, high: 400 },
                tools: [
                    { name: "Adjustable Wrench Set", asin: "B00MWTPUJI" },
                    { name: "Pipe Tape & Sealant Kit", asin: "B07JG7N9L1" },
                    { name: "Leak Detection Dye", asin: "B08DVKQX98" }
                ]
            },
            pipe: {
                base: { low: 300, high: 1200 },
                tools: [
                    { name: "Pipe Wrench 18-inch", asin: "B000BQRTBY" },
                    { name: "Tubing Cutter", asin: "B005F2KZ6K" },
                    { name: "Propane Torch Kit", asin: "B07CY82L5D" },
                    { name: "Pipe Threading Set", asin: "B00AQWZJKC" }
                ]
            },
            drain: {
                base: { low: 100, high: 350 },
                tools: [
                    { name: "Professional Drain Snake", asin: "B00CBKZPAW" },
                    { name: "Plunger Set", asin: "B01N3OYDAO" },
                    { name: "Drain Auger", asin: "B08R7QZGTG" }
                ]
            },
            heater: {
                base: { low: 800, high: 2500 },
                tools: [
                    { name: "Pipe Wrench Set", asin: "B089LZKCPD" },
                    { name: "Temperature Gauge", asin: "B07XJ6DPQ8" },
                    { name: "Dielectric Union Kit", asin: "B075PWR73M" },
                    { name: "Water Heater Drain Valve", asin: "B00M1LR0RG" }
                ]
            },
            faucet: {
                base: { low: 150, high: 500 },
                tools: [
                    { name: "Faucet Installation Kit", asin: "B08R7S3QKC" },
                    { name: "Basin Wrench", asin: "B000BQTX28" },
                    { name: "Adjustable Wrench", asin: "B00MWTPUJI" }
                ]
            },
            toilet: {
                base: { low: 100, high: 400 },
                tools: [
                    { name: "Toilet Flapper Kit", asin: "B00009TKXX" },
                    { name: "Plunger", asin: "B01N3OYDAO" },
                    { name: "Toilet Fill Valve", asin: "B00HS51BVK" }
                ]
            },
            sewer: {
                base: { low: 2000, high: 8000 },
                tools: [
                    { name: "Professional Sewer Snake", asin: "B00CBKZPAW" },
                    { name: "Camera Inspection System", asin: "B08R7STMQX" },
                    { name: "Heavy Duty Pipe Wrench", asin: "B089LZKCPD" }
                ]
            },
            disposal: {
                base: { low: 200, high: 600 },
                tools: [
                    { name: "Garbage Disposal Unit", asin: "B08R7VWQMK" },
                    { name: "Pipe Wrench Set", asin: "B089LZKCPD" },
                    { name: "Mounting Bolts Kit", asin: "B07JG7N9L1" }
                ]
            }
        };
        
        const regionMultipliers = {
            northeast: 1.2,
            southeast: 0.95,
            midwest: 0.9,
            southwest: 1.05,
            west: 1.25
        };
        
        const urgencyMultipliers = {
            standard: 1.0,
            sameday: 1.5,
            emergency: 2.0
        };
        
        const propertyMultipliers = {
            residential: 1.0,
            commercial: 1.5
        };
        
        document.getElementById('estimatorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const jobType = document.getElementById('jobType').value;
            const property = document.getElementById('propertyType').value;
            const region = document.getElementById('region').value;
            const urgency = document.getElementById('urgency').value;
            
            const jobData = costData[jobType];
            const regionMult = regionMultipliers[region];
            const urgencyMult = urgencyMultipliers[urgency];
            const propertyMult = propertyMultipliers[property];
            
            const low = Math.round(jobData.base.low * regionMult * propertyMult * urgencyMult);
            const high = Math.round(jobData.base.high * regionMult * propertyMult * urgencyMult);
            
            document.getElementById('costRange').textContent = `$${low.toLocaleString()} - $${high.toLocaleString()}`;
            
            const jobNames = {
                leak: 'Leak Repair',
                pipe: 'Pipe Replacement',
                drain: 'Drain Cleaning',
                heater: 'Water Heater Installation',
                faucet: 'Faucet Replacement',
                toilet: 'Toilet Repair',
                sewer: 'Sewer Line Repair',
                disposal: 'Garbage Disposal Installation'
            };
            
            const regionNames = {
                northeast: 'Northeast',
                southeast: 'Southeast',
                midwest: 'Midwest',
                southwest: 'Southwest',
                west: 'West Coast'
            };
            
            const urgencyNames = {
                standard: 'Standard (2-3 business days)',
                sameday: 'Same-Day Service',
                emergency: 'Emergency (24/7)'
            };
            
            let details = `
                <p><strong>Job Type:</strong> ${jobNames[jobType]}</p>
                <p><strong>Property Type:</strong> ${property.charAt(0).toUpperCase() + property.slice(1)}</p>
                <p><strong>Region:</strong> ${regionNames[region]}</p>
                <p><strong>Service Level:</strong> ${urgencyNames[urgency]}</p>
            `;
            
            document.getElementById('jobDetails').innerHTML = details;
            
            let toolHTML = '';
            jobData.tools.forEach(tool => {
                const amazonUrl = `https://www.amazon.com/dp/${tool.asin}?tag=tradspro20-20`;
                toolHTML += `<div class="tool-link"><a href="${amazonUrl}" target="_blank">${tool.name} (Amazon)</a></div>`;
            });
            
            document.getElementById('toolLinks').innerHTML = toolHTML;
            document.getElementById('result').classList.add('show');
        });
    </script>
